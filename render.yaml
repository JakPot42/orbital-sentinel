services:
  - type: web
    name: orbital-sentinel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SPACETRACK_USER
        sync: false
      - key: SPACETRACK_PASS
        sync: false
      - key: DEMO_MODE
        value: "True"
